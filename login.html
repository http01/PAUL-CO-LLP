<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Client Login | PAUL & CO LLP
    </title>


    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }


        body{

            min-height:100vh;
            background:
            linear-gradient(
            rgba(0,0,0,0.75),
            rgba(0,0,0,0.85)
            ),
            url("images/gold-bg.jpg");

            background-size:cover;
            background-position:center;

            display:flex;
            justify-content:center;
            align-items:center;

            color:white;

        }


        .login-container{

            width:400px;
            padding:40px;

            background:rgba(20,20,20,0.95);

            border-radius:20px;

            border:1px solid #FFD700;

            box-shadow:
            0 0 30px rgba(255,215,0,0.25);

            text-align:center;

        }


        .logo img{

            width:90px;
            height:90px;

            object-fit:contain;

            margin-bottom:15px;

        }


        .company-name{

            color:#FFD700;

            font-size:28px;

            font-weight:bold;

            margin-bottom:5px;

        }


        .system-name{

            color:#ddd;

            font-size:18px;

            margin-bottom:30px;

        }


        .login-title{

            font-size:25px;

            margin-bottom:25px;

        }


        .input-box{

            text-align:left;

            margin-bottom:20px;

        }


        .input-box label{

            display:block;

            margin-bottom:8px;

            color:#FFD700;

            font-size:15px;

        }


        .input-box input{

            width:100%;

            padding:14px;

            border:none;

            outline:none;

            border-radius:8px;

            background:#222;

            color:white;

            font-size:16px;

            border:1px solid #444;

        }


        .input-box input:focus{

            border-color:#FFD700;

        }


        .password-area{

            position:relative;

        }


        .password-area span{

            position:absolute;

            right:15px;

            top:14px;

            cursor:pointer;

            color:#FFD700;

        }


        .login-button{

            width:100%;

            padding:15px;

            margin-top:15px;

            background:#FFD700;

            color:black;

            border:none;

            border-radius:30px;

            font-size:17px;

            font-weight:bold;

            cursor:pointer;

            transition:.3s;

        }


        .login-button:hover{

            background:white;

        }


        .message{

            margin-top:20px;

            color:#ff5555;

            font-size:14px;

        }

.back-button{

    display:inline-block;

    margin-top:20px;

    color:#FFD700;

    text-decoration:none;

    font-size:15px;

    transition:.3s;

}


.back-button:hover{

    color:white;

}


    </style>

</head>


<body>


<div class="login-container">


    <div class="logo">

        <img src="logo.jpeg" alt="PAUL & CO LLP Logo">

    </div>


    <div class="company-name">

        PAUL & CO LLP

    </div>


    <div class="system-name">

        Gold Track System

    </div>


    <h2 class="login-title">

        Client Portal Login

    </h2>


    <form id="loginForm">


        <div class="input-box">

            <label>
                Client ID
            </label>

            <input 
            type="text" 
            id="clientID"
            placeholder="Enter Client ID"
            >


        </div>


        <div class="input-box">


            <label>
                Password
            </label>


            <div class="password-area">


                <input 
                type="password"
                id="password"
                placeholder="Enter Password"
                >


                <span onclick="showPassword()">
                    👁
                </span>


            </div>


        </div>


        <button 
        type="submit"
        class="login-button">

            Login

        </button>
<a href="index.html" class="back-button">
    ← Back
</a>

    </form>


    <p class="message" id="message"></p>

    <!-- ==========================================
         Part 2A-2: login.html (Continue)
    =========================================== -->


    <div class="security-info">

        <h3>
            Secure Gold Access
        </h3>

        <p>
            This portal allows authorized clients of
            PAUL & CO LLP to securely access their
            gold tracking information.
        </p>


        <div class="security-items">


            <div class="security-box">

                🔒

                <span>
                    Protected Login
                </span>

            </div>



            <div class="security-box">

                📍

                <span>
                    Gold Tracking
                </span>

            </div>



            <div class="security-box">

                🛡️

                <span>
                    Asset Security
                </span>

            </div>


        </div>


    </div>



    <footer>

        <p>

            © 2026 PAUL & CO LLP

        </p>


        <span>

            Gold Track System

        </span>

    </footer>
<script>


// ==========================================
// Gold Track System
// PAUL & CO LLP
// Login Authentication
// ==========================================


// Show / Hide Password

function showPassword(){

    let password =
    document.getElementById("password");


    if(password.type === "password"){

        password.type = "text";

    }

    else{

        password.type = "password";

    }

}




// Login System

document
.getElementById("loginForm")
.addEventListener("submit", function(event){


    event.preventDefault();


    let clientID =
    document.getElementById("clientID").value.trim();


    let password =
    document.getElementById("password").value.trim();


    let message =
    document.getElementById("message");



    // Demo Client Account

   if(
    clientID.toUpperCase() === "PCLGT0740" &&
    password.toLowerCase() === "gold047"
){


        localStorage.setItem(
            "goldTrackLogin",
            "true"
        );


        localStorage.setItem(
            "clientID",
            clientID
        );



        message.style.color="#00ff88";


        message.innerHTML =
        "Login successful. Opening dashboard...";



        setTimeout(function(){


            window.location.href =
            "dashboard.html";


        },1500);



    }

    else{


        message.style.color="red";


        message.innerHTML =
        "Invalid Client ID or Password";


    }


});


</script>



</body>

</html>
